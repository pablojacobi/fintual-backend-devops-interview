services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backend_devops_interview}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-backend_devops_interview}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - web_pgcache:/app/.cache/uv
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             exec python manage.py runserver 0.0.0.0:8000"

  seed:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: ["seed"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - web_pgcache:/app/.cache/uv
    command: ["python", "manage.py", "seed"]

volumes:
  postgres_data:
  web_pgcache:
